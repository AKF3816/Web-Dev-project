<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feeds</title>
    <link rel="stylesheet" href="css/feedStyle.css">
</head>
<body>
    <div class="container">

        <aside class="sidebar">
            <h1>SocialConnect</h1>
            <ul>
                <li>
                    <a href="#" onclick="goToMyProfile()">
                        <img class="icon" src="svg/user-profile-person-svgrepo-com.svg">
                        Profile
                    </a>
                </li>
                <li>
                    <a href="feed.html">
                        <img class="icon" src="svg/newsFeed.svg">
                        News
                    </a>
                </li>
                <li>
                    <a href="login.html">
                        <img class="icon" src="svg/login.svg">
                        Logout
                    </a>
                </li>
            </ul>
        </aside>

        <header class="header">
            <h1>SocialConnect</h1>
            <nav class="navbar">
                <ul>
                    <li>
                        <a href="#" onclick="goToMyProfile()">
                            <img class="icon" src="svg/user-profile-person-svgrepo-com.svg">
                            <span>Profile</span>
                        </a>
                    </li>
                    <li>
                        <a href="feed.html">
                            <img class="icon" src="svg/newsFeed.svg">
                            <span>News</span>
                        </a>
                    </li>
                    <li>
                        <a href="login.html">
                            <img class="icon" src="svg/login.svg">
                            <span>Logout</span>
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search users...">
                <div class="search-results" id="searchResults"></div>
            </div>
        </header>

        <div class="postbar">
            <form>
                <input id="postText" placeholder="What's on your mind?" type="text">
                <button type="button" id="pstButton">Post</button>
            </form>
        </div>

        <main class="center">
            <section id="posts"></section>
        </main>

    </div>
    <script src="js/posts.js"></script>
</body>
</html>
